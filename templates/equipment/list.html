{% extends 'base/base.html' %}
{% block title %}Equipment{% endblock %}
{% block content %}
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h2>Equipment</h2>
    <a class="btn" href="/equipment/add/">Add</a>
  </div>
  <table>
    <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Qty</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>
      {% for e in items %}
      <tr>
        <td>{{ e.id }}</td><td>{{ e.name }}</td><td>{{ e.category }}</td><td>{{ e.quantity }}</td><td>{{ e.status }}</td>
        <td><a class="btn secondary" href="/equipment/{{ e.id }}/delete/">Delete</a></td>
      </tr>
      {% empty %}
      <tr><td colspan="6">No equipment</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
