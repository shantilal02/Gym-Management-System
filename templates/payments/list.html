{% extends 'base/base.html' %}
{% block title %}Payments{% endblock %}
{% block content %}
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h2>Payments</h2>
    <a class="btn" href="/payments/record/">Record</a>
  </div>
  <table>
    <thead><tr><th>ID</th><th>Member</th><th>Amount</th><th>Method</th><th>Txn</th></tr></thead>
    <tbody>
      {% for p in payments %}
      <tr>
        <td>{{ p.id }}</td><td>{{ p.member_name }}</td><td>₹{{ p.amount }}</td><td>{{ p.method }}</td><td>{{ p.transaction_id }}</td>
      </tr>
      {% empty %}
      <tr><td colspan="5">No payments</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
