{% extends 'base/base.html' %}
{% block title %}Record Payment{% endblock %}
{% block content %}
<div class="card" style="max-width:640px;margin:auto;">
  <h2>Record Payment</h2>
  <form method="post">{% csrf_token %}
    <label>Member</label>
    <select class="select" name="member_id">
      {% for m in members %}
        <option value="{{ m.id }}">{{ m.name }}</option>
      {% endfor %}
    </select>
    <label>Amount</label><input class="input" type="number" step="0.01" name="amount" required>
    <label>Method</label>
    <select class="select" name="method">
      <option>CASH</option>
      <option>CARD</option>
      <option>UPI</option>
    </select>
    <button class="btn" type="submit">Record</button>
  </form>
</div>
{% endblock %}
