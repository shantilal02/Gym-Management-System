{% extends 'base/base.html' %}
{% block title %}Create Member{% endblock %}
{% block content %}
<div class="card" style="max-width:720px;margin:auto;">
  <h2>Create Member</h2>
  <form method="post">{% csrf_token %}
    <label>Name</label><input class="input" name="name" required>
    <label>Age</label><input class="input" name="age" type="number" required>
    <label>Plan</label><input class="input" name="plan" required>
    <label>Price</label><input class="input" name="price" type="number" step="0.01" required>
    <label>Duration Days</label><input class="input" name="duration_days" type="number" value="30" required>
    <button class="btn" type="submit">Create</button>
  </form>
</div>
{% endblock %}
